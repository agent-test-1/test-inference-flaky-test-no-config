version: 2.1

# Define reusable commands
commands:
  install_dependencies:
    description: "Install npm dependencies"
    steps:
      - restore_cache:
          keys:
            - npm-deps-v1-{{ checksum "package.json" }}
            - npm-deps-v1-
      - run:
          name: Install Dependencies
          command: npm install
      - save_cache:
          key: npm-deps-v1-{{ checksum "package.json" }}
          paths:
            - ~/.npm

jobs:
  test-flaky:
    docker:
      - image: cimg/node:18.17
    working_directory: ~/project
    steps:
      - checkout
      - install_dependencies
      
      # Run tests and generate JUnit XML results
      - run:
          name: Run Flaky Tests
          command: |
            # Create test results directory
            mkdir -p test-results/vitest
            
            # Run tests with JUnit reporter
            npm run test:run -- --reporter=junit --outputFile=test-results/vitest/results.xml
          # Don't fail the job if tests fail (since they're intentionally flaky)
          when: always
      
      # Store test results for CircleCI UI
      - store_test_results:
          path: test-results
      
      # Store test artifacts
      - store_artifacts:
          path: test-results
          destination: test-results
      
      # Run tests multiple times to demonstrate flakiness
      - run:
          name: Run Multiple Test Iterations (Demonstrate Flakiness)
          command: |
            echo "Running tests 5 times to demonstrate flaky behavior..."
            mkdir -p test-results/iterations
            
            for i in {1..5}; do
              echo "=== Test Run $i ==="
              npm run test:run -- --reporter=junit --outputFile=test-results/iterations/results-run-$i.xml || true
              echo "Run $i completed"
              echo ""
            done
            
            # Create summary
            echo "=== Flaky Test Summary ===" > test-results/flaky-summary.txt
            echo "Total test runs: 5" >> test-results/flaky-summary.txt
            echo "Results stored in test-results/iterations/" >> test-results/flaky-summary.txt
            echo "These tests are intentionally flaky to demonstrate different failure patterns" >> test-results/flaky-summary.txt
          when: always
      
      # Store iteration artifacts
      - store_artifacts:
          path: test-results/iterations
          destination: test-iterations
      
      - store_artifacts:
          path: test-results/flaky-summary.txt
          destination: flaky-summary

  # Job to run tests with different node versions to show environment dependencies
  test-different-environments:
    parameters:
      node-version:
        type: string
        default: "18.17"
    docker:
      - image: cimg/node:<< parameters.node-version >>
    working_directory: ~/project
    steps:
      - checkout
      - install_dependencies
      
      - run:
          name: Run Tests on Node << parameters.node-version >>
          command: |
            echo "Running flaky tests on Node.js << parameters.node-version >>"
            mkdir -p test-results/node-<< parameters.node-version >>
            npm run test:run -- --reporter=junit --outputFile=test-results/node-<< parameters.node-version >>/results.xml || true
          when: always
      
      - store_test_results:
          path: test-results
      
      - store_artifacts:
          path: test-results
          destination: test-results-node-<< parameters.node-version >>

workflows:
  version: 2
  test-flaky-behavior:
    jobs:
      # Main flaky test job
      - test-flaky
      

