version: 2.1

orbs:
  node: circleci/node@5

jobs:
  install:
    executor:
      name: node/default
      tag: "22.19"
    resource_class: medium
    steps:
      - checkout
      - node/install-packages:
          pkg-manager: npm
          cache-path: ~/.npm
          override-ci-command: npm ci

  test:
    executor:
      name: node/default
      tag: "22.19"
    resource_class: medium
    steps:
      - checkout
      - node/install-packages:
          pkg-manager: npm
          cache-path: ~/.npm
          override-ci-command: npm ci
      - run:
          name: Create test results directory
          command: mkdir -p test-results/vitest
      - run:
          name: Run Vitest tests
          command: npm run test:ci
      - store_test_results:
          path: test-results
      - store_artifacts:
          path: test-results
          destination: test-results

  build:
    executor:
      name: node/default
      tag: "22.19"
    resource_class: medium
    steps:
      - checkout
      - node/install-packages:
          pkg-manager: npm
          cache-path: ~/.npm
          override-ci-command: npm ci
      - run:
          name: Build project
          command: |
            if npm run --list build 2>/dev/null | grep -q "^build$"; then
              npm run build
            else
              echo "No build script found, skipping."
            fi

  # # deploy:
  # #   # Uncomment and configure this job for your deployment needs.
  # #   # You will need to add environment variables (e.g., SSH keys, cloud credentials)
  # #   # in your CircleCI project settings before enabling this job.
  # #   docker:
  # #     - image: cimg/base:stable
  # #   steps:
  # #     - checkout
  # #     - run:
  # #         name: Deploy
  # #         command: |
  # #           # e.g. ./scripts/deploy.sh
  # #           echo "Add your deploy steps here"

workflows:
  ci:
    jobs:
      - install
      - test:
          requires:
            - install
      - build:
          requires:
            - install
